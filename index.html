<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Outils Pharmacie</title>
<style>
  :root{
    --bg:#eef1f5; --panel:#ffffff; --border:#d6dce5; --ink:#1f2630;
    --muted:#697586; --accent:#0c5bbd; --accent-d:#094a99;
    --danger:#c0392b; --ok:#1e8e5a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg); color:var(--ink); font-size:14px;
  }
  header{
    background:var(--panel); border-bottom:1px solid var(--border);
    padding:10px 18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  }
  header .brand{display:flex; align-items:center; gap:10px}
  header h1{font-size:16px; margin:0; font-weight:700}
  header .sub{color:var(--muted); font-size:12px}
  .back{
    font-size:13px; font-weight:600; padding:7px 12px; border-radius:8px;
    border:1px solid var(--border); background:#fff; color:var(--ink); cursor:pointer;
  }
  .back:hover{border-color:var(--accent); color:var(--accent)}
  .privacy{
    margin-left:auto; background:#e8f3ec; color:#155f3b; border:1px solid #bfe0cd;
    font-size:12px; padding:4px 10px; border-radius:6px;
  }

  /* ---------- ACCUEIL ---------- */
  .home{max-width:1000px; margin:0 auto; padding:34px 22px}
  .home h2{font-size:20px; margin:0 0 4px}
  .home p.lead{color:var(--muted); margin:0 0 26px}
  .tiles{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:16px}
  .tile{
    background:var(--panel); border:1px solid var(--border); border-radius:14px;
    padding:18px; cursor:pointer; transition:.15s; display:flex; flex-direction:column; gap:8px;
    text-align:left;
  }
  .tile:hover{border-color:var(--accent); box-shadow:0 6px 20px rgba(12,91,189,.12); transform:translateY(-2px)}
  .tile .ico{font-size:30px}
  .tile .t-title{font-weight:700; font-size:15px; line-height:1.25}
  .tile .t-desc{color:var(--muted); font-size:12.5px; line-height:1.4}
  .tile.soon{cursor:default; opacity:.6}
  .tile.soon:hover{border-color:var(--border); box-shadow:none; transform:none}
  .badge-soon{
    align-self:flex-start; margin-top:auto; font-size:11px; font-weight:600;
    background:#f0f0f3; color:var(--muted); padding:2px 8px; border-radius:20px;
  }

  /* ---------- OUTIL ---------- */
  main{
    display:grid; grid-template-columns:380px 1fr; gap:0;
    height:calc(100vh - 53px);
  }
  .form{overflow:auto; padding:16px 18px; border-right:1px solid var(--border); background:var(--panel)}
  .preview{overflow:auto; padding:24px; background:#aab3c0; display:flex; flex-direction:column; align-items:center; gap:16px}
  fieldset{border:1px solid var(--border); border-radius:10px; padding:12px 14px 14px; margin:0 0 16px}
  legend{font-size:12px; font-weight:700; color:var(--accent); padding:0 6px}
  .field{margin-bottom:11px}
  .field label{display:block; font-size:12px; color:var(--muted); margin-bottom:3px}
  .field input,.field textarea{
    width:100%; font-size:14px; padding:7px 9px; border:1px solid var(--border);
    border-radius:7px; font-family:inherit; color:var(--ink); background:#fdfdfe;
  }
  .field input:focus,.field textarea:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(12,91,189,.15)}
  .field textarea{resize:vertical; min-height:48px}
  .row{display:flex; gap:8px}
  .row .field{flex:1}
  .check{display:flex; align-items:flex-start; gap:8px; font-size:13px; color:var(--ink)}
  .check input{width:auto; margin-top:2px}
  .actions{
    position:sticky; bottom:0; background:var(--panel); padding-top:10px;
    border-top:1px solid var(--border); display:flex; flex-wrap:wrap; gap:8px;
  }
  button.act{
    font-size:13px; font-weight:600; padding:9px 12px; border-radius:8px;
    border:1px solid var(--border); background:#fff; color:var(--ink); cursor:pointer;
  }
  button.act:hover{border-color:var(--accent); color:var(--accent)}
  button.act.primary{background:var(--accent); border-color:var(--accent); color:#fff}
  button.act.primary:hover{background:var(--accent-d)}
  button.act.ghost{color:var(--muted)}
  button.act.ghost:hover{color:var(--danger); border-color:var(--danger)}
  .canvas-wrap{background:#fff; box-shadow:0 4px 18px rgba(0,0,0,.25); border-radius:2px}
  canvas{display:block; max-width:100%; height:auto}
  .hint{font-size:11px; color:var(--muted)}
  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:#1f2630; color:#fff; padding:10px 18px; border-radius:8px;
    font-size:13px; opacity:0; transition:opacity .2s; pointer-events:none; z-index:50;
  }
  .toast.show{opacity:1}
  [hidden]{display:none !important}
  @media (max-width:820px){
    main{grid-template-columns:1fr; height:auto}
    .form{border-right:none; border-bottom:1px solid var(--border)}
  }
</style>
</head>
<body>
<header>
  <button class="back" id="btn-back" hidden>← Tous les outils</button>
  <div class="brand">
    <h1 id="hdr-title">Outils Pharmacie</h1>
    <div class="sub" id="hdr-sub">Documents à remplir &amp; imprimer</div>
  </div>
  <span class="privacy">🔒 Aucune donnée enregistrée</span>
</header>

<!-- ACCUEIL -->
<section class="home" id="home">
  <h2>Documents officine</h2>
  <p class="lead">Choisissez un document à remplir. Les données ne sont jamais enregistrées et s'effacent à la fermeture.</p>
  <div class="tiles" id="tiles"></div>
</section>

<!-- OUTIL -->
<main id="tool" hidden>
  <div class="form">
    <div id="formfields"></div>
    <div class="actions">
      <button class="act primary" id="btn-copy">📋 Copier l'image</button>
      <button class="act" id="btn-print">🖨️ Imprimer</button>
      <button class="act" id="btn-png">🖼️ Télécharger PNG</button>
      <button class="act ghost" id="btn-clear">🗑️ Effacer</button>
    </div>
  </div>
  <div class="preview">
    <div class="canvas-wrap"><canvas id="cv"></canvas></div>
    <div class="hint">Aperçu fidèle — c'est exactement ce qui sera imprimé / collé.</div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   MOTEUR DE RENDU CANVAS (blocs déclaratifs, réutilisable)
   ============================================================ */
const PAGE_W = 820, MARGIN = 52, DPR = 2, EXPORT_W = 1000;

function wrap(ctx, text, maxW){
  const words = String(text).split(/\s+/);
  const lines=[]; let cur='';
  for(const w of words){
    const test = cur ? cur+' '+w : w;
    if(ctx.measureText(test).width > maxW && cur){ lines.push(cur); cur=w; }
    else cur=test;
  }
  if(cur) lines.push(cur);
  return lines.length?lines:[''];
}

function render(ctx, blocks, draw){
  const cw = PAGE_W - MARGIN*2;
  let y = MARGIN;
  const F=(px,bold)=>`${bold?'bold ':''}${px}px Arial, Helvetica, sans-serif`;

  function line(label,value,x,y,w){
    ctx.font=F(13,true); ctx.fillStyle='#000'; ctx.textBaseline='alphabetic';
    let lx=x;
    if(label){ if(draw) ctx.fillText(label,lx,y); lx+=ctx.measureText(label).width+5; }
    ctx.font=F(13,false);
    const valEnd=x+w;
    if(draw){
      ctx.fillText(value||'',lx,y);
      ctx.strokeStyle='#888'; ctx.lineWidth=0.6;
      ctx.beginPath(); ctx.moveTo(lx-2,y+4); ctx.lineTo(valEnd,y+4); ctx.stroke();
    }
    return valEnd;
  }

  for(const b of blocks){
    switch(b.type){
      case 'logo':{
        ctx.textAlign='left'; ctx.textBaseline='alphabetic';
        if(draw){
          ctx.font=F(17,true); ctx.fillStyle='#4a6ab5'; ctx.fillText("l'Assurance",MARGIN,y+14);
          ctx.font=F(22,true); ctx.fillStyle='#0a3d91'; ctx.fillText("Maladie",MARGIN,y+36);
        }
        y += 50 + (b.gap??10);
        break;
      }
      case 'heading':{
        ctx.font=F(b.size||14,true); ctx.fillStyle='#000'; ctx.textAlign=b.align||'center';
        for(const ln of wrap(ctx,b.text,cw)){ if(draw) ctx.fillText(ln,b.align==='left'?MARGIN:PAGE_W/2,y); y+=(b.size||14)+5; }
        ctx.textAlign='left'; y+=(b.gap??6);
        break;
      }
      case 'paragraph':{
        ctx.font=F(b.size||12.5,b.bold); ctx.fillStyle='#000'; ctx.textAlign='left';
        for(const ln of wrap(ctx,b.text,cw)){ if(draw) ctx.fillText(ln,MARGIN,y); y+=(b.size||12.5)+5; }
        y+=(b.gap??8);
        break;
      }
      case 'field':{ line(b.label,b.value,MARGIN,y,cw); y+=26; break; }
      case 'fieldrow':{
        ctx.textAlign='left';
        const slot=cw/b.items.length;
        b.items.forEach((it,i)=>line(it.label,it.value,MARGIN+i*slot,y,slot-12));
        y+=26; break;
      }
      case 'checkbox':{
        ctx.strokeStyle='#000'; ctx.lineWidth=1;
        if(draw){ ctx.strokeRect(MARGIN,y-11,13,13);
          if(b.checked){ ctx.font=F(13,true); ctx.fillStyle='#000'; ctx.fillText('✕',MARGIN+1.5,y); } }
        ctx.font=F(12.5,false); ctx.fillStyle='#000'; ctx.textAlign='left';
        const lines=wrap(ctx,b.label,cw-22);
        lines.forEach((ln,i)=>{ if(draw) ctx.fillText(ln,MARGIN+22,y+i*17); });
        y+=Math.max(22,lines.length*17+6); break;
      }
      case 'checkrow':{
        ctx.textAlign='left'; ctx.textBaseline='alphabetic';
        let x=MARGIN;
        if(b.label){ ctx.font=F(12.5,true); ctx.fillStyle='#000'; if(draw) ctx.fillText(b.label,x,y); x+=ctx.measureText(b.label).width+14; }
        for(const it of b.items){
          ctx.strokeStyle='#000'; ctx.lineWidth=1;
          if(draw){ ctx.strokeRect(x,y-11,13,13); if(it.checked){ ctx.font=F(13,true); ctx.fillStyle='#000'; ctx.fillText('✕',x+1.5,y); } }
          x+=19;
          ctx.font=F(12.5,false); ctx.fillStyle='#000';
          if(draw) ctx.fillText(it.label,x,y);
          x+=ctx.measureText(it.label).width+24;
        }
        y+=24+(b.gap??0); break;
      }
      case 'note':{
        ctx.font=F(b.size||9.5,false); ctx.fillStyle='#333'; ctx.textAlign='left';
        for(const ln of wrap(ctx,b.text,cw)){ if(draw) ctx.fillText(ln,MARGIN,y); y+=(b.size||9.5)+4; }
        y+=(b.gap??4); break;
      }
      case 'hr':{
        if(draw){ ctx.strokeStyle='#000'; ctx.lineWidth=0.8; ctx.beginPath(); ctx.moveTo(MARGIN,y); ctx.lineTo(PAGE_W-MARGIN,y); ctx.stroke(); }
        y+=(b.gap??12); break;
      }
      case 'spacer':{ y+=b.h||14; break; }
    }
  }
  return y + MARGIN;
}

/* ============================================================
   DÉFINITION DES DOCUMENTS
   Pour ajouter un doc : une entrée { title, icon, desc, fields, blocks(d) }
   ============================================================ */
/* Helpers cases à cocher (fiche cystite) */
const cbItems = arr => arr.map(c=>({key:c.key, label:c.label, type:'checkbox'}));
const cbBlocks = (arr,d) => arr.map(c=>({type:'checkbox', checked:!!d[c.key], label:c.label}));

  {key:'u_pyelo', label:"Autres symptômes suggérant une pyélonéphrite : douleurs au niveau des fosses lombaires ou au niveau des flancs / vomissements / diarrhées / douleurs abdominales"},
];
const CYSTITE_EXCL = [
  {key:'e_masculin', label:"Sexe masculin"},
  {key:'e_age', label:"Âge < 16 ans ou > 65 ans"},

  {key:'e_grossesse', label:"Grossesse avérée ou non exclue"},
  {key:'e_gyneco', label:"Signes d'appel gynécologique : leucorrhées, prurit vulvaire ou vaginal"},
  {key:'e_repetition', label:"Cystites à répétition : ≥ 3 épisodes dans les 12 derniers mois"},
  {key:'e_nonresolue', label:"Épisode de cystite non complètement résolue dans les 15 derniers jours"},
  {key:'e_anomalie', label:"Anomalie fonctionnelle ou organique de l'arbre urinaire (uropathie, résidu vésical, reflux, lithiase, tumeur, geste chirurgical récent, endoscopique ou sondage…)"},
  {key:'e_immuno', label:"Immunodépression ou risque d'immunodépression dus à une pathologie (VIH) ou à un médicament (corticothérapie au long cours, chimiothérapie, immunosuppresseurs)"},
  {key:'e_catheter', label:"Port d'un cathéter veineux implanté"},
  {key:'e_irc', label:"Insuffisance rénale sévère rapportée par la patiente ou débit de filtration glomérulaire (DFG) < 30 mL/min/1,73 m² selon CKD-EPI"},
  {key:'e_atb', label:"Antibiothérapie en cours pour une autre pathologie"},
  {key:'e_fluoro', label:"Prise de fluoroquinolones dans les 3 mois précédents (risque de sélection de germes résistants)"},
  {key:'e_doute', label:"Doute du pharmacien"},
];
const CYSTITE_QUESTIONS = [
  {key:'q_maladies', label:"Quelles maladies ou interventions chirurgicales avez-vous ou avez-vous eues ?"},
  {key:'q_allergies', label:"Avez-vous des allergies (notamment aux pénicillines) ou des intolérances médicamenteuses ? Si oui, lesquelles ?"},
  {key:'q_traitements', label:"Des traitements médicamenteux vous sont-ils prescrits actuellement ? Si oui, lesquels ?"},
  {key:'q_evenement', label:"Un événement marquant de santé vous a-t-il affecté depuis un an ?"},
  {key:'q_autrepoint', label:"Souhaitez-vous me signaler un autre point concernant votre santé ?"},
];
const CYSTITE_GRAVITE = [
  {key:'g_temp', label:"Température mesurée par le pharmacien > 38 °C ou < 36 °C"},
  {key:'g_constantes', label:"Altération franche des constantes mesurées par le pharmacien : Pression Artérielle Systolique < 90 mm Hg, ou Fréquence Cardiaque > 110/mn, ou Fréquence Respiratoire > 20/mn"},
];

const DOCUMENTS = {

  'attestation-etranger-aura': {
    title: "Attestation séjour à l'étranger",
    icon: "✈️",
    desc: "Prise en charge d'un traitement de plus d'un mois pour un séjour à l'étranger (régime général AURA).",
    fields: [
      {sec:"Renseignements administratifs", items:[
        {key:'nom', label:'Nom et Prénom'},
        {key:'adresse', label:'Adresse', type:'textarea'},
        {key:'tel', label:'Téléphone'},
        {key:'nss', label:"N° d'immatriculation de sécurité sociale"},
        {key:'nationalite', label:'Nationalité'},
        {key:'lieu', label:'Lieu de séjour'},
        {key:'date_depart', label:'Date de départ'},
        {key:'duree', label:'Durée du séjour'},
        {key:'motif', label:'Motif du séjour'},
      ]},
      {sec:"Séjours à l'étranger depuis le 1ᵉʳ janvier (année N-1)", items:[
        {row:[{key:'s1_dep',label:'Départ'},{key:'s1_ret',label:'Retour'},{key:'s1_dur',label:'Durée'}]},
        {row:[{key:'s2_dep',label:'Départ'},{key:'s2_ret',label:'Retour'},{key:'s2_dur',label:'Durée'}]},
        {row:[{key:'s3_dep',label:'Départ'},{key:'s3_ret',label:'Retour'},{key:'s3_dur',label:'Durée'}]},
        {key:'aucun', label:"Je n'ai effectué aucun séjour à l'étranger pendant cette période", type:'checkbox'},
      ]},
      {sec:"Signature", items:[
        {key:'fait_a', label:'Fait à'},
        {key:'fait_le', label:'Le', type:'date'},
      ]},
    ],
    blocks(d){
      return [
        {type:'logo', gap:6},
        {type:'heading', text:"« ATTESTATION SUR L'HONNEUR »", size:13, gap:8},
        {type:'paragraph', text:"DEMANDE DE PRISE EN CHARGE PAR L'ASSURANCE MALADIE D'UN TRAITEMENT MÉDICAMENTEUX DE PLUS D'UN MOIS EN UNE SEULE FOIS POUR SÉJOUR À L'ÉTRANGER", bold:true, size:11.5, gap:3},
        {type:'paragraph', text:"Pour les bénéficiaires du régime général de la Région AURA", bold:true, size:11, gap:10},
        {type:'paragraph', text:"➔ Je soussigné(e), atteste sur l'honneur les renseignements administratifs suivants :", size:12.5, gap:10},
        {type:'field', label:'Nom et Prénom :', value:d.nom},
        {type:'field', label:'Adresse :', value:(d.adresse||'').replace(/\n/g,' ')},
        {type:'field', label:'Téléphone :', value:d.tel},
        {type:'field', label:"N° d'immatriculation de sécurité sociale :", value:d.nss},
        {type:'field', label:'Nationalité :', value:d.nationalite},
        {type:'field', label:'Lieu de séjour :', value:d.lieu},
        {type:'field', label:'Date de départ :', value:d.date_depart},
        {type:'field', label:'Durée du séjour :', value:d.duree},
        {type:'field', label:'Motif du séjour :', value:d.motif},
        {type:'spacer', h:10},
        {type:'paragraph', text:"➔ Merci de préciser vos dates de séjour(s) à l'étranger effectués depuis le 1ᵉʳ janvier de l'année précédant votre départ (pour un départ prévu en année N, indiquer vos dates de séjours à l'étranger depuis le 1ᵉʳ janvier année N-1) :", size:11.5, gap:8},
        {type:'fieldrow', items:[{label:'Date de départ :',value:d.s1_dep},{label:'Date de retour :',value:d.s1_ret},{label:'Durée :',value:d.s1_dur}]},
        {type:'fieldrow', items:[{label:'Date de départ :',value:d.s2_dep},{label:'Date de retour :',value:d.s2_ret},{label:'Durée :',value:d.s2_dur}]},
        {type:'fieldrow', items:[{label:'Date de départ :',value:d.s3_dep},{label:'Date de retour :',value:d.s3_ret},{label:'Durée :',value:d.s3_dur}]},
        {type:'spacer', h:6},
        {type:'paragraph', text:"En l'absence de séjour à l'étranger sur la période, cocher la case ci-dessous :", size:11.5, gap:6},
        {type:'checkbox', checked:!!d.aucun, label:"Je n'ai effectué aucun séjour à l'étranger pendant cette période"},
        {type:'spacer', h:16},
        {type:'field', label:'Fait à :', value:(d.fait_a||'') + (d.fait_le?('     le '+formatDate(d.fait_le)):'')},
        {type:'spacer', h:30},
        {type:'paragraph', text:"Signature :", bold:true, size:12, gap:40},
        {type:'hr', gap:8},
        {type:'note', text:"À noter que le bénéfice des droits aux prestations en nature de l'Assurance Maladie est conditionné au séjour sur le sol français de plus de 6 mois, sauf cas particulier (exemples : personnels diplomatiques et consulaires, travailleurs détachés…)."},
      ];
    }
  },

  'location-materiel': {
    title: "Location de matériel",
    icon: "📦",
    desc: "Fiche de location de matériel médical (patient, durée, appareil, caution).",
    fields: [
      {sec:"Opérateur", items:[ {key:'operateur', label:'Opérateur'} ]},
      {sec:"Renseignements patients", items:[
        {key:'nom', label:'NOM / prénom'},
        {key:'adresse', label:'Adresse', type:'textarea'},
        {key:'tel', label:'N° TEL'},
      ]},
      {sec:"Location", items:[
        {key:'date_ordo', label:'Date ordonnance', type:'date'},
        {key:'duree', label:'Durée de location'},
        {key:'debut', label:'Début de location / date de prolongation'},
      ]},
      {sec:"Appareil — Type", items:[
        {key:'type_pharmacie', label:'Pharmacie', type:'checkbox'},
        {key:'type_autre', label:'Autre', type:'checkbox'},
        {key:'type_autre_txt', label:'Autre (préciser)'},
      ]},
      {sec:"Caution", items:[
        {key:'montant', label:'Montant (€)'},
        {key:'pay_cheque', label:'Chèque', type:'checkbox'},
        {key:'pay_especes', label:'Espèces', type:'checkbox'},
      ]},
    ],
    blocks(d){
      const typeItems=[
        {label:'Pharmacie', checked:!!d.type_pharmacie},
        {label:'Autre'+(d.type_autre_txt?(' : '+d.type_autre_txt):''), checked:!!d.type_autre},
      ];
      const payItems=[
        {label:'Chèque', checked:!!d.pay_cheque},

      ];
      return [

        {type:'field', label:'Adresse :', value:(d.adresse||'').replace(/\n/g,' ')},

      ];
    }
  },

  'cystite-eligibilite': {
    title: "Cystite — éligibilité TROD",
    icon: "🚺",
    desc: "Fiche de vérification d'éligibilité et de réalisation du TROD cystite.",
    fields: [
      {sec:"Identification", items:[
        {row:[{key:'date', label:'Date', type:'date'},{key:'age', label:'Âge'}]},
        {key:'nom', label:'Nom et Prénom'},
        {row:[{key:'medecin', label:'Médecin traitant'},{key:'nss', label:'N° de sécurité sociale'}]},
      ]},
      {sec:"Exclusion — consultation médicale d'urgence", items: cbItems(CYSTITE_URGENCE)},
      {sec:"(1) Autres critères d'exclusion — consultation < 24h", items: cbItems(CYSTITE_EXCL)},
      {sec:"Questions de vérification", items: cbItems(CYSTITE_QUESTIONS).concat([
        {key:'q_allergies_txt', label:'Allergies / intolérances — préciser'},
        {key:'q_traitements_txt', label:'Traitements en cours — préciser'},
      ])},
      {sec:"(2) Signes de gravité", items: cbItems(CYSTITE_GRAVITE)},
      {sec:"Décision", items:[
        {key:'accord_oui', label:'Accord du patient : Oui', type:'checkbox'},
        {key:'accord_non', label:'Accord du patient : Non', type:'checkbox'},
        {key:'trod_oui', label:'Réalisation TROD cystite : Oui', type:'checkbox'},
        {key:'trod_non', label:'Réalisation TROD cystite : Non', type:'checkbox'},
      ]},
    ],
    blocks(d){
      const B=[
        {type:'heading', text:"FICHE D'ÉLIGIBILITÉ — TROD CYSTITE", size:14, gap:8},
        {type:'fieldrow', items:[{label:'Date :', value:d.date?formatDate(d.date):''},{label:'Âge :', value:d.age}]},
        {type:'field', label:'Nom et Prénom :', value:d.nom},
        {type:'fieldrow', items:[{label:'Médecin traitant :', value:d.medecin},{label:'N° séc. sociale :', value:d.nss}]},
        {type:'spacer', h:8},
        {type:'paragraph', text:"Critères d'exclusion nécessitant une consultation médicale d'urgence :", bold:true, size:12, gap:6},
      ].concat(cbBlocks(CYSTITE_URGENCE,d));
      B.push({type:'spacer', h:6});
      B.push({type:'paragraph', text:"(1) Autres critères d'exclusion nécessitant une consultation médicale dans les 24h :", bold:true, size:12, gap:6});
      B.push(...cbBlocks(CYSTITE_EXCL,d));
      B.push({type:'spacer', h:6});
      B.push({type:'paragraph', text:"Questions à poser dans le cadre de la vérification de l'éligibilité :", bold:true, size:12, gap:6});
      B.push(...cbBlocks(CYSTITE_QUESTIONS,d));
      if(d.q_allergies_txt) B.push({type:'field', label:'→ Allergies / intolérances :', value:d.q_allergies_txt});
      if(d.q_traitements_txt) B.push({type:'field', label:'→ Traitements en cours :', value:d.q_traitements_txt});
      B.push({type:'spacer', h:6});
      B.push({type:'paragraph', text:"(2) Recherche de signes de gravité :", bold:true, size:12, gap:6});
      B.push(...cbBlocks(CYSTITE_GRAVITE,d));
      B.push({type:'spacer', h:8});
      B.push({type:'paragraph', text:"Accord du patient (ou du représentant légal) pour la réalisation du TROD :", size:12, gap:2});
      B.push({type:'checkrow', items:[{label:'Oui', checked:!!d.accord_oui},{label:'Non', checked:!!d.accord_non}], gap:6});
      B.push({type:'paragraph', text:"Réalisation d'un TROD cystite :", size:12, gap:2});
      B.push({type:'checkrow', items:[{label:'Oui', checked:!!d.trod_oui},{label:'Non', checked:!!d.trod_non}]});
      B.push({type:'note', text:"Si la réponse est oui, se reporter à la fiche de traçabilité de réalisation du TROD."});
      return B;
    }
  },

};

// Applications/outils intégrés (ouvrent une page dédiée, pas un document canvas)
const APPS = [
  {icon:"🧾", title:"Comptage de caisse", desc:"Compter billets, pièces et rouleaux — total automatique.", url:"./caisse/"},
];

// Documents prévus (tuiles grisées, pas encore disponibles)
const COMING_SOON = [
  {icon:"🦠", title:"TROD angine", desc:"Fiche de dispensation après test rapide d'orientation diagnostique angine."},
];

/* ============================================================
   APPLICATION
   ============================================================ */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let currentId = null;
let data = {};

function formatDate(iso){
  if(!iso) return '';
  const [y,m,dd]=iso.split('-');
  return (y&&m&&dd) ? `${dd}/${m}/${y}` : iso;
}
function todayISO(){
  const n=new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}

/* ---------- Accueil / navigation ---------- */
function buildTiles(){
  const root=document.getElementById('tiles'); root.innerHTML='';
  for(const id in DOCUMENTS){
    const doc=DOCUMENTS[id];
    const t=document.createElement('div'); t.className='tile';
    t.innerHTML=`<div class="ico">${doc.icon||'📄'}</div>
      <div class="t-title">${doc.title}</div>
      <div class="t-desc">${doc.desc||''}</div>`;
    t.addEventListener('click',()=>openDoc(id));
    root.appendChild(t);
  }
  for(const a of APPS){
    const t=document.createElement('div'); t.className='tile';
    t.innerHTML=`<div class="ico">${a.icon}</div>
      <div class="t-title">${a.title}</div>
      <div class="t-desc">${a.desc}</div>`;
    t.addEventListener('click',()=>{ window.location.href=a.url; });
    root.appendChild(t);
  }
  for(const s of COMING_SOON){
    const t=document.createElement('div'); t.className='tile soon';
    t.innerHTML=`<div class="ico">${s.icon}</div>
      <div class="t-title">${s.title}</div>
      <div class="t-desc">${s.desc}</div>
      <span class="badge-soon">À venir</span>`;
    root.appendChild(t);
  }
}

function openDoc(id){
  currentId=id;
  data={ fait_le: todayISO() };
  document.getElementById('home').hidden=true;
  document.getElementById('tool').hidden=false;
  document.getElementById('btn-back').hidden=false;
  document.getElementById('hdr-title').textContent=DOCUMENTS[id].title;
  document.getElementById('hdr-sub').textContent="Remplir, imprimer ou copier dans Winpharma";
  buildForm(); draw();
}

function showHome(){
  currentId=null;
  document.getElementById('tool').hidden=true;
  document.getElementById('home').hidden=false;
  document.getElementById('btn-back').hidden=true;
  document.getElementById('hdr-title').textContent="Outils Pharmacie";
  document.getElementById('hdr-sub').textContent="Documents à remplir & imprimer";
}
document.getElementById('btn-back').addEventListener('click', showHome);

/* ---------- Formulaire ---------- */
function buildForm(){
  const doc=DOCUMENTS[currentId];
  const root=document.getElementById('formfields'); root.innerHTML='';
  for(const section of doc.fields){
    const fs=document.createElement('fieldset');
    const lg=document.createElement('legend'); lg.textContent=section.sec; fs.appendChild(lg);
    for(const it of section.items){
      if(it.row){
        const row=document.createElement('div'); row.className='row';
        for(const sub of it.row) row.appendChild(makeField(sub));
        fs.appendChild(row);
      } else fs.appendChild(makeField(it));
    }
    root.appendChild(fs);
  }
}
function makeField(it){
  const w=document.createElement('div');
  if(it.type==='checkbox'){
    w.className='check';
    const id='f_'+it.key;
    w.innerHTML=`<input type="checkbox" id="${id}"><label for="${id}" style="margin:0">${it.label}</label>`;
    w.querySelector('input').checked=!!data[it.key];
    w.querySelector('input').addEventListener('change',e=>{ data[it.key]=e.target.checked; draw(); });
    return w;
  }
  w.className='field';
  const lab=document.createElement('label'); lab.textContent=it.label; w.appendChild(lab);
  let inp;
  if(it.type==='textarea') inp=document.createElement('textarea');
  else { inp=document.createElement('input'); inp.type=it.type||'text'; }
  inp.value=data[it.key]||'';
  inp.addEventListener('input',e=>{ data[it.key]=e.target.value; draw(); });
  w.appendChild(inp);
  return w;
}

/* ---------- Rendu ---------- */
function paint(canvas, scale){
  const c=canvas.getContext('2d');
  const blocks=DOCUMENTS[currentId].blocks(data);
  const h=render(c,blocks,false);
  canvas.width=Math.round(PAGE_W*scale);
  canvas.height=Math.round(h*scale);
  c.setTransform(scale,0,0,scale,0,0);
  c.fillStyle='#fff'; c.fillRect(0,0,PAGE_W,h);
  render(c,blocks,true);
  return h;
}
function draw(){ paint(cv,DPR); cv.style.width=PAGE_W+'px'; }
function exportCanvas(){ const oc=document.createElement('canvas'); paint(oc,EXPORT_W/PAGE_W); return oc; }

function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2400);
}

/* ---------- Actions ---------- */
document.getElementById('btn-copy').addEventListener('click', async ()=>{
  const oc=exportCanvas();
  const blobPromise=new Promise(res=>oc.toBlob(res,'image/png'));
  try{
    await navigator.clipboard.write([new ClipboardItem({'image/png':blobPromise})]);
    const kb=Math.round((await blobPromise).size/1024);
    toast(`✅ Image copiée (${kb} Ko) — collez-la dans Winpharma (Ctrl+V / Cmd+V)`);
  }catch(err){
    blobPromise.then(downloadBlob);
    toast('⚠️ Presse-papier refusé par le navigateur → image téléchargée');
  }
});
document.getElementById('btn-png').addEventListener('click', ()=>{ exportCanvas().toBlob(downloadBlob,'image/png'); });
function downloadBlob(blob){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=currentId+'.png'; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
document.getElementById('btn-print').addEventListener('click', ()=>{
  const url=exportCanvas().toDataURL('image/png');
  const w=window.open('','_blank');
  w.document.write(`<html><head><title>Impression</title>
    <style>@page{margin:12mm} body{margin:0} img{width:100%}</style></head>
    <body><img src="${url}" onload="window.print()"></body></html>`);
  w.document.close();
});
document.getElementById('btn-clear').addEventListener('click', ()=>{
  if(!confirm('Effacer toutes les données saisies ?')) return;
  data={ fait_le: todayISO() };
  buildForm(); draw(); toast('🗑️ Données effacées');
});

/* ---------- Init ---------- */
buildTiles();
showHome();
</script>
</body>
</html>
