<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Comptage de caisse</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #171717;
  --surface2: #1e1e1e;
  --surface3: #272727;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0ede8;
  --text2: #777;
  --text3: #404040;
  --green: #3ecf8e;
  --red: #f55;
  --orange: #f5a623;
  --r: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

.shell {
  height: 100vh;
  display: grid;
  grid-template-rows: 44px 1fr 148px;
  grid-template-columns: 1fr 1fr 1fr;
  column-gap: 8px;
  padding: 0 12px;
}

/* HEADER */
header {
  grid-column: 1 / -1;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 0.5px solid var(--border);
  padding: 0 2px;
}
.logo { font-size: 15px; font-weight: 600; letter-spacing: -0.03em; }
.logo span { color: var(--orange); }
.date-chip { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: .04em; text-transform: uppercase; }
nav { display: flex; gap: 2px; }
nav button {
  background: none; border: none; color: var(--text2);
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  padding: 4px 10px; cursor: pointer; border-radius: 6px;
  transition: color .15s, background .15s;
}
nav button.active { color: var(--orange); background: rgba(245,166,35,.1); }

/* COLONNES SAISIE */
.col {
  grid-row: 2;
  display: flex; flex-direction: column;
  overflow: hidden;
  padding: 8px 0 4px;
}
.col-hd {
  display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-shrink: 0;
}
.col-hd .lbl { font-size: 9px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--text3); white-space: nowrap; }
.col-hd .ln { flex: 1; height: 0.5px; background: var(--border); }
.col-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 3px; }

/* ROW */
.row {
  display: flex; align-items: center; gap: 6px;
  height: 40px; flex-shrink: 0;
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--r); padding: 0 7px;
  transition: border-color .12s, background .12s;
}
.row.has-value { border-color: rgba(245,166,35,.22); background: rgba(245,166,35,.035); }
.row-icon { flex-shrink: 0; display: flex; align-items: center; }
.row-info { flex: 1; min-width: 0; overflow: hidden; }
.row-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-note { font-size: 9px; color: var(--text3); }

.qty-ctrl { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
.qty-btn {
  width: 26px; height: 26px; border-radius: 7px;
  border: 0.5px solid var(--border2); background: var(--surface2);
  color: var(--text); font-size: 17px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .1s, transform .08s; user-select: none;
}
.qty-btn:active { background: var(--surface3); transform: scale(.9); }
.qty-input {
  width: 38px; height: 26px;
  background: var(--surface2); border: 0.5px solid var(--border2);
  border-radius: 5px; color: var(--text); font-family: 'DM Mono', monospace;
  font-size: 12px; font-weight: 500; text-align: center; padding: 0;
  -moz-appearance: textfield; appearance: textfield;
}
.qty-input::-webkit-inner-spin-button,
.qty-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.qty-input:focus { outline: none; border-color: var(--orange); background: #1c180e; }
.row-sub {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--text3); min-width: 46px; text-align: right; flex-shrink: 0;
}
.row-sub.active { color: var(--orange); }

/* FOOTER */
.footer {
  grid-column: 1 / -1;
  border-top: 0.5px solid var(--border);
  padding: 8px 0 10px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  column-gap: 8px;
  align-items: center;
}

.totals-col { display: flex; flex-direction: column; gap: 4px; }
.tot-row { display: flex; justify-content: space-between; align-items: center; }
.tot-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }
.tot-val { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }
.tot-val.active { color: var(--text2); }

.main-col { display: flex; flex-direction: column; gap: 6px; }
.main-total-row { display: flex; align-items: baseline; justify-content: space-between; }
.main-total-label { font-size: 11px; color: var(--text2); }
.main-total-amount { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; color: var(--text); }
.ecart-fonds { display: flex; align-items: center; gap: 6px; }
.fonds-wrap { display: flex; align-items: center; gap: 5px; flex: 1; }
.fonds-wrap label { font-size: 10px; color: var(--text3); white-space: nowrap; }
.fonds-wrap input {
  flex: 1; background: var(--surface2); border: 0.5px solid var(--border2);
  border-radius: 5px; color: var(--text); font-family: 'DM Mono', monospace;
  font-size: 12px; padding: 4px 7px; text-align: right; min-width: 0;
}
.fonds-wrap input:focus { outline: none; border-color: var(--orange); }
.ecart-badge {
  font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
  padding: 4px 9px; border-radius: 5px; white-space: nowrap;
  background: var(--surface2); color: var(--text3);
}
.ecart-badge.pos { background: rgba(62,207,142,.12); color: var(--green); }
.ecart-badge.neg { background: rgba(255,85,85,.12); color: var(--red); }
.ecart-badge.zero { background: rgba(62,207,142,.1); color: var(--green); }

.btns-col { display: flex; flex-direction: column; gap: 5px; }
.btn {
  width: 100%; padding: 9px; border-radius: var(--r);
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 0.5px solid var(--border2);
  background: var(--surface2); color: var(--text2); transition: all .12s;
}
.btn:hover { color: var(--text); }
.btn.primary { background: var(--orange); color: #1a0800; border-color: var(--orange); font-weight: 600; }
.btn.primary:active { opacity: .85; }
.btn.danger:hover { border-color: var(--red); color: var(--red); }

/* PAGE HISTORIQUE */
.page-hist {
  display: none;
  grid-column: 1 / -1;
  grid-row: 2;
  overflow-y: auto;
  padding: 8px 0 4px;
  scrollbar-width: thin;
  scrollbar-color: var(--surface3) transparent;
}
.page-hist.active { display: block; }
.page-saisie { display: contents; }
.page-saisie.hidden { display: none; }

.hist-item {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--r); padding: 9px 12px;
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;
  cursor: pointer; transition: border-color .12s;
}
.hist-item:hover { border-color: var(--border2); }
.hist-item.expanded { border-color: rgba(245,166,35,.2); }
.hist-date { font-size: 12px; font-weight: 500; color: var(--text); text-transform: capitalize; }
.hist-detail { font-size: 10px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
.hist-detail-expand {
  font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace;
  margin-top: 5px; padding-top: 5px; border-top: 0.5px solid var(--border); display: none;
}
.hist-item.expanded .hist-detail-expand { display: block; }
.hist-amount { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: var(--text); text-align: right; }
.hist-ecart { font-size: 10px; text-align: right; margin-top: 2px; font-family: 'DM Mono', monospace; }
.empty-state { text-align: center; padding: 40px 0; color: var(--text3); font-size: 13px; }
.clear-hist {
  background: none; border: 0.5px solid var(--border); border-radius: 6px;
  color: var(--text3); font-family: 'DM Sans', sans-serif; font-size: 11px;
  padding: 6px 14px; cursor: pointer; transition: all .12s; margin-top: 6px;
}
.clear-hist:hover { border-color: var(--red); color: var(--red); }

/* TOAST */
.toast {
  position: fixed; bottom: 160px; left: 50%; transform: translateX(-50%) translateY(6px);
  background: var(--green); color: #001a0d; font-size: 12px; font-weight: 600;
  padding: 6px 16px; border-radius: 20px; opacity: 0;
  transition: all .22s; pointer-events: none; white-space: nowrap; z-index: 99;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="shell">

  <header>
    <div style="display:flex;align-items:center;gap:10px">
      <a href="../" title="Retour aux outils" style="text-decoration:none;color:var(--orange);border:0.5px solid var(--border2);border-radius:8px;padding:6px 11px;font-weight:700;font-size:15px;line-height:1">←</a>
      <div class="logo">caisse<span>.</span></div>
      <div class="date-chip" id="date-chip"></div>
    </div>
    <nav>
      <button class="active" onclick="showPage('saisie',this)">Saisie</button>
      <button onclick="showPage('historique',this)">Historique</button>
    </nav>
  </header>

  <div class="page-saisie" id="page-saisie">
    <div class="col">
      <div class="col-hd"><span class="ln"></span><span class="lbl">Billets</span><span class="ln"></span></div>
      <div class="col-body" id="body-billets"></div>
    </div>
    <div class="col">
      <div class="col-hd"><span class="ln"></span><span class="lbl">Pièces</span><span class="ln"></span></div>
      <div class="col-body" id="body-pieces"></div>
    </div>
    <div class="col">
      <div class="col-hd"><span class="ln"></span><span class="lbl">Rouleaux</span><span class="ln"></span></div>
      <div class="col-body" id="body-rouleaux"></div>
    </div>
  </div>

  <div class="page-hist" id="page-historique">
    <div id="hist-list"></div>
    <div><button class="clear-hist" onclick="clearHist()">🗑 Effacer l'historique</button></div>
  </div>

  <div class="footer">
    <div class="totals-col">
      <div class="tot-row"><span class="tot-lbl">Billets</span><span class="tot-val" id="t-billets">0,00 €</span></div>
      <div class="tot-row"><span class="tot-lbl">Pièces</span><span class="tot-val" id="t-pieces">0,00 €</span></div>
      <div class="tot-row"><span class="tot-lbl">Rouleaux</span><span class="tot-val" id="t-rouleaux">0,00 €</span></div>
    </div>
    <div class="main-col">
      <div class="main-total-row">
        <span class="main-total-label">Total compté</span>
        <span class="main-total-amount" id="t-total">0,00 €</span>
      </div>
      <div class="ecart-fonds">
        <div class="fonds-wrap">
          <label for="fonds">Fond attendu</label>
          <input type="number" id="fonds" value="200" min="0" step="0.01" oninput="recalc()">
        </div>
        <div class="ecart-badge" id="ecart-badge">–</div>
      </div>
    </div>
    <div class="btns-col">
      <button class="btn danger" onclick="resetAll()">Remettre à zéro</button>
      <button class="btn primary" onclick="saveEntry()">Enregistrer ✓</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
function billet(fill, stroke, label, tc) {
  return `<svg width="48" height="27" viewBox="0 0 48 27" xmlns="http://www.w3.org/2000/svg">
    <rect width="48" height="27" rx="4" fill="${fill}"/>
    <rect x="2" y="2" width="44" height="23" rx="3" fill="none" stroke="${stroke}" stroke-width="1"/>
    <rect x="3" y="3" width="9" height="21" rx="2" fill="${stroke}" opacity=".2"/>
    <rect x="36" y="3" width="9" height="21" rx="2" fill="${stroke}" opacity=".2"/>
    <text x="24" y="18" text-anchor="middle" font-size="9" font-weight="500" fill="${tc}" font-family="DM Mono,monospace">${label}</text>
  </svg>`;
}
function piece(r, fill, ring, txt, tc) {
  const cx = r+3;
  return `<svg width="${cx*2}" height="${cx*2}" viewBox="0 0 ${cx*2} ${cx*2}" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${cx}" cy="${cx}" r="${r}" fill="${fill}" stroke="${ring}" stroke-width="1.2"/>
    <circle cx="${cx}" cy="${cx}" r="${r*.58}" fill="${ring}" opacity=".25"/>
    <text x="${cx}" y="${cx+r*.44}" text-anchor="middle" font-size="${Math.max(5,r*.5)}" font-weight="500" fill="${tc}" font-family="DM Mono,monospace">${txt}</text>
  </svg>`;
}
function rouleau(body, cap, border, txt, tc) {
  return `<svg width="20" height="32" viewBox="0 0 20 32" xmlns="http://www.w3.org/2000/svg">
    <rect x="1" y="5" width="18" height="22" rx="2" fill="${body}" stroke="${border}" stroke-width=".8"/>
    <ellipse cx="10" cy="5" rx="9" ry="3.5" fill="${cap}" stroke="${border}" stroke-width=".8"/>
    <ellipse cx="10" cy="27" rx="9" ry="3.5" fill="${cap}" stroke="${border}" stroke-width=".8"/>
    <text x="10" y="18" text-anchor="middle" font-size="4.5" font-weight="500" fill="${tc}" font-family="DM Mono,monospace">${txt}</text>
  </svg>`;
}

const BILLETS = [
  {val:50, label:"50 €", svg:billet("#d4770a","#a05500","50 €","#fff3e0")},
  {val:20, label:"20 €", svg:billet("#2563a8","#1a4580","20 €","#dbeafe")},
  {val:10, label:"10 €", svg:billet("#c0392b","#8b1a1a","10 €","#fde8e8")},
  {val:5,  label:"5 €",  svg:billet("#4a4a4a","#2a2a2a","5 €","#d4d4d4")},
];
const PIECES = [
  {val:2,   label:"2 €",    svg:piece(15,"#5a5a52","#8a8a7a","2€","#e8e8dc")},
  {val:1,   label:"1 €",    svg:piece(13,"#6e6e62","#9e9e8e","1€","#eeeedf")},
  {val:0.5, label:"50 cts", svg:piece(12,"#b8860b","#d4a017","50c","#fff8dc")},
  {val:0.2, label:"20 cts", svg:piece(11,"#b8860b","#d4a017","20c","#fff8dc")},
  {val:0.1, label:"10 cts", svg:piece(10,"#b8860b","#d4a017","10c","#fff8dc")},
];
const ROULEAUX = [
  {val:50,  label:"Rouleau 2 €",    note:"25 × 2 € = 50 €",   svg:rouleau("#4a3a8a","#6a55b8","#7a60d0","2 €","#e8e0ff")},
  {val:25,  label:"Rouleau 1 €",    note:"25 × 1 € = 25 €",   svg:rouleau("#4a4a42","#6a6a60","#8a8a78","1 €","#e8e8dc")},
  {val:20,  label:"Rouleau 50 cts", note:"40 × 50c = 20 €",   svg:rouleau("#1a6e4a","#2a9e6a","#35bb7e","50c","#d0f5e8")},
  {val:8,   label:"Rouleau 20 cts", note:"40 × 20c = 8 €",    svg:rouleau("#a06010","#d08020","#e89030","20c","#fff0cc")},
  {val:5,   label:"Rouleau 10 cts", note:"50 × 10c = 5 €",    svg:rouleau("#1a3a7e","#2a5ab8","#3a6ecc","10c","#d0e4ff")},
  {val:2.5, label:"Rouleau 5 cts",  note:"50 × 5c = 2,50 €",  svg:rouleau("#8a1a1a","#c03030","#d84040","5c","#ffd8d8")},
  {val:1,   label:"Rouleau 2 cts",  note:"50 × 2c = 1 €",     svg:rouleau("#3a3a3a","#5a5a5a","#787878","2c","#d8d8d8")},
  {val:0.5, label:"Rouleau 1 ct",   note:"50 × 1c = 0,50 €",  svg:rouleau("#2a2a2a","#484848","#686868","1c","#c8c8c8")},
];

const allItems = [
  ...BILLETS.map(b=>({...b,cat:'b'})),
  ...PIECES.map(p=>({...p,cat:'p'})),
  ...ROULEAUX.map(r=>({...r,cat:'r'}))
];
const counts = {};
allItems.forEach(i => counts[i.cat+'_'+i.val] = 0);

const fmt = n => n.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';

function updateRow(key, val) {
  const n = counts[key] || 0;
  const el = document.getElementById('sub_'+key);
  el.textContent = n > 0 ? fmt(n*val) : '–';
  el.className = 'row-sub'+(n>0?' active':'');
  document.getElementById('row_'+key).className = 'row'+(n>0?' has-value':'');
  recalc();
}
function change(key, val, delta) {
  counts[key] = Math.max(0,(counts[key]||0)+delta);
  const inp = document.getElementById('inp_'+key);
  inp.value = counts[key]>0 ? counts[key] : '';
  updateRow(key,val);
}
function onInput(key, val) {
  const inp = document.getElementById('inp_'+key);
  counts[key] = inp.value.trim()==='' ? 0 : Math.max(0,parseInt(inp.value,10)||0);
  updateRow(key,val);
}
function recalc() {
  let tb=0,tp=0,tr=0;
  allItems.forEach(i=>{
    const s=(counts[i.cat+'_'+i.val]||0)*i.val;
    if(i.cat==='b') tb+=s; else if(i.cat==='p') tp+=s; else tr+=s;
  });
  const total=tb+tp+tr;
  const g=id=>document.getElementById(id);
  g('t-billets').textContent=fmt(tb); g('t-billets').className='tot-val'+(tb>0?' active':'');
  g('t-pieces').textContent=fmt(tp);  g('t-pieces').className='tot-val'+(tp>0?' active':'');
  g('t-rouleaux').textContent=fmt(tr);g('t-rouleaux').className='tot-val'+(tr>0?' active':'');
  g('t-total').textContent=fmt(total);
  const fonds=parseFloat(g('fonds').value)||0;
  const ecart=total-fonds;
  const badge=g('ecart-badge');
  if(Math.abs(ecart)<0.005){badge.textContent='✓ OK';badge.className='ecart-badge zero';}
  else if(ecart>0){badge.textContent='+'+fmt(ecart);badge.className='ecart-badge pos';}
  else{badge.textContent=fmt(ecart);badge.className='ecart-badge neg';}
}
function resetAll() {
  if(!confirm('Remettre tous les compteurs à zéro ?')) return;
  allItems.forEach(i=>{
    const k=i.cat+'_'+i.val; counts[k]=0;
    const inp=document.getElementById('inp_'+k); if(inp) inp.value='';
    const el=document.getElementById('sub_'+k); el.textContent='–'; el.className='row-sub';
    document.getElementById('row_'+k).className='row';
  });
  recalc();
}
function buildRows(items, cat, containerId) {
  const c=document.getElementById(containerId);
  items.forEach(item=>{
    const key=cat+'_'+item.val;
    const d=document.createElement('div');
    d.className='row'; d.id='row_'+key;
    d.innerHTML=`
      <div class="row-icon">${item.svg}</div>
      <div class="row-info">
        <div class="row-name">${item.label}</div>
        ${item.note?`<div class="row-note">${item.note}</div>`:''}
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="change('${key}',${item.val},-1)">−</button>
        <input class="qty-input" id="inp_${key}" type="number" min="0" step="1" placeholder="0"
          oninput="onInput('${key}',${item.val})" onfocus="this.select()">
        <button class="qty-btn" onclick="change('${key}',${item.val},+1)">+</button>
      </div>
      <span class="row-sub" id="sub_${key}">–</span>`;
    c.appendChild(d);
  });
}
buildRows(BILLETS,'b','body-billets');
buildRows(PIECES,'p','body-pieces');
buildRows(ROULEAUX,'r','body-rouleaux');

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function saveEntry() {
  let tb=0,tp=0,tr=0;
  allItems.forEach(i=>{
    const s=(counts[i.cat+'_'+i.val]||0)*i.val;
    if(i.cat==='b') tb+=s; else if(i.cat==='p') tp+=s; else tr+=s;
  });
  const total=tb+tp+tr;
  const fonds=parseFloat(document.getElementById('fonds').value)||0;
  const now=new Date();
  const entry={
    date:now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}),
    year:now.getFullYear(),
    heure:now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
    total,billets:tb,pieces:tp,rouleaux:tr,ecart:total-fonds,fonds,
    detail:Object.fromEntries(allItems.filter(i=>counts[i.cat+'_'+i.val]>0).map(i=>[i.label,counts[i.cat+'_'+i.val]]))
  };
  const hist=JSON.parse(localStorage.getItem('caisse_v5')||'[]');
  hist.unshift(entry);
  localStorage.setItem('caisse_v5',JSON.stringify(hist.slice(0,90)));
  showToast('Clôture enregistrée ✓');
}
function renderHist() {
  const hist=JSON.parse(localStorage.getItem('caisse_v5')||'[]');
  const el=document.getElementById('hist-list');
  if(!hist.length){el.innerHTML='<div class="empty-state">Aucune clôture enregistrée</div>';return;}
  el.innerHTML=hist.map(e=>{
    const ec=Math.abs(e.ecart)<0.005
      ?'<span style="color:#3ecf8e">✓ Équilibré</span>'
      :e.ecart>0?`<span style="color:#3ecf8e">+${fmt(e.ecart)}</span>`
               :`<span style="color:#f55">${fmt(e.ecart)}</span>`;
    const dl=e.detail?Object.entries(e.detail).map(([k,v])=>`${k} ×${v}`).join(' · '):'';
    return `<div class="hist-item" onclick="this.classList.toggle('expanded')">
      <div style="flex:1;min-width:0">
        <div class="hist-date">${e.date} ${e.year||''}</div>
        <div class="hist-detail">${e.heure} · fond ${fmt(e.fonds||0)}</div>
        ${dl?`<div class="hist-detail-expand">${dl}</div>`:''}
      </div>
      <div style="flex-shrink:0;text-align:right;margin-left:12px">
        <div class="hist-amount">${fmt(e.total)}</div>
        <div class="hist-ecart">${ec}</div>
      </div>
    </div>`;
  }).join('');
}
function clearHist() {
  if(!confirm("Effacer tout l'historique ?")) return;
  localStorage.removeItem('caisse_v5'); renderHist();
}
function showPage(name,btn) {
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const saisie=document.getElementById('page-saisie');
  const hist=document.getElementById('page-historique');
  if(name==='historique'){saisie.classList.add('hidden');hist.classList.add('active');renderHist();}
  else{saisie.classList.remove('hidden');hist.classList.remove('active');}
}

const now=new Date();
document.getElementById('date-chip').textContent=
  now.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
recalc();
</script>
